name: prediction-ledger

on:
  schedule:
    - cron: "7,37 * * * *" # every 30 min through the final - relax after Jul 19
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh market ratings from title outrights
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/market-ratings.mjs

      - name: Capture and grade forecasts
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/ledger.mjs

      - name: Install SDK for bet analysis
        run: npm install --no-save --no-audit --no-fund @anthropic-ai/sdk

      - name: Run paper bankroll
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC }}
        run: node scripts/bankroll.mjs

      - name: Commit ledger updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update prediction ledger"
          git push

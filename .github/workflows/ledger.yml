name: prediction-ledger

on:
  schedule:
    - cron: "17 */2 * * *" # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh market ratings from title outrights
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/market-ratings.mjs

      - name: Capture and grade forecasts
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/ledger.mjs

      - name: Commit ledger updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update prediction ledger"
          git push
